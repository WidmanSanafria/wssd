events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain application/json application/javascript text/css application/xml;

    # Docker DNS resolver — re-resuelve IPs automáticamente cuando los containers se recrean
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream spring  { server spring:8080; }
    upstream angular { server angular:4000; }

    # Redirect HTTP → HTTPS (en prod con dominio real)
    server {
        listen 80;
        server_name _;

        # Permite ACME challenge de Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Todo lo demás → HTTPS si hay cert, sino sirve directo (dev local)
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server (solo activo si hay certs montados)
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/cert/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cert/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API — Spring Boot
        location /api/ {
            proxy_pass         http://spring;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 60s;
            proxy_buffering    off;
            proxy_max_temp_file_size 0;
        }

        # Actuator health
        location /actuator/ {
            proxy_pass http://spring;
            proxy_set_header Host $host;
        }

        # Swagger UI
        location /swagger-ui/ {
            proxy_pass http://spring;
            proxy_set_header Host $host;
        }

        location /v3/api-docs {
            proxy_pass http://spring;
            proxy_set_header Host $host;
        }

        # Cookie sync — extensión Chrome WSSD
        location /sync-cookies {
            proxy_pass         http://extractor:8001/sync-cookies;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Angular SSR — everything else
        location / {
            proxy_pass         http://angular;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_read_timeout 60s;
        }
    }
}
