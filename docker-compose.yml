version: "3.9"

services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - spring
      - angular
    restart: unless-stopped

  spring:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL:              jdbc:postgresql://postgres:5432/wssd
      DB_USER:             wssd
      DB_PASSWORD:         ${DB_PASSWORD:-wssd_dev}
      REDIS_HOST:          redis
      REDIS_PORT:          6379
      EXTRACTOR_MS_URL:    http://extractor:8001
      JWT_SECRET:          ${JWT_SECRET:-dev-secret-change-in-prod-must-be-32-chars!}
      STRIPE_SECRET_KEY:   ${STRIPE_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      extractor:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  angular:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      API_URL: http://spring:8080
    restart: unless-stopped

  extractor:
    build:
      context: ./extractor
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       wssd
      POSTGRES_USER:     wssd
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wssd_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wssd -d wssd"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
