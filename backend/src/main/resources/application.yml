server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wssd}
    username: ${DB_USER:wssd}
    password: ${DB_PASSWORD:wssd}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  threads:
    virtual:
      enabled: true
  webflux:
    base-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-32-chars!!}
  expiration-ms: 900000
  refresh-expiration-ms: 604800000

extractor:
  ms-url: ${EXTRACTOR_MS_URL:http://localhost:8001}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  pro-price-id: ${STRIPE_PRO_PRICE_ID:price_pro_monthly}
  enterprise-price-id: ${STRIPE_ENTERPRISE_PRICE_ID:price_enterprise_monthly}

wssd:
  free-downloads-before-ads: 1
  free-downloads-total: 5
  rate-limit:
    per-minute: 20
    per-hour: 100

app:
  url: ${APP_URL:http://localhost}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${APP_URL:http://localhost}/api/auth/oauth2/google/callback
  facebook:
    client-id: ${FB_CLIENT_ID:}
    client-secret: ${FB_CLIENT_SECRET:}
    redirect-uri: ${APP_URL:http://localhost}/api/auth/oauth2/facebook/callback

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${APP_URL:http://localhost}/api/auth/oauth2/google/callback
