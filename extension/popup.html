<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WSSD Cookie Sync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 420px;
      background: #e0e5ec;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #2d3748;
    }

    /* Neomorphism helpers */
    .neo    { background:#e0e5ec; border-radius:16px; box-shadow:6px 6px 14px #a3b1c6,-6px -6px 14px #ffffff; }
    .neo-sm { background:#e0e5ec; border-radius:12px; box-shadow:4px 4px 10px #a3b1c6,-4px -4px 10px #ffffff; }
    .neo-in { background:#e0e5ec; border-radius:10px; box-shadow:inset 4px 4px 8px #a3b1c6,inset -4px -4px 8px #ffffff; }

    /* Header */
    .header {
      padding: 18px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { display:flex; align-items:center; gap:8px; }
    .logo-dot {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #1877f2, #833ab4, #e1306c);
      box-shadow: 3px 3px 8px #a3b1c6;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-dot svg { width:14px; height:14px; fill:#fff; }
    .logo-name { font-size: 1rem; font-weight: 900; color: #2d3748; }
    .logo-sub  { font-size: .65rem; color: #718096; font-weight: 500; }
    .settings-btn {
      background: none; border: none; cursor: pointer; padding: 6px;
      border-radius: 8px; color: #718096;
      box-shadow: 3px 3px 7px #a3b1c6, -2px -2px 5px #ffffff;
    }
    .settings-btn:hover { color: #2d3748; }

    /* Platform list */
    .platforms { padding: 4px 16px 8px; display: flex; flex-direction: column; gap: 10px; }

    .platform-row {
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .platform-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
      box-shadow: 3px 3px 8px #a3b1c6, -3px -3px 8px #ffffff;
    }
    .platform-icon.ig { background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); }
    .platform-icon.fb { background: #1877f2; color: #fff; font-weight: 900; font-size:.9rem; }
    .platform-icon.tt { background: #000; }
    .platform-icon.yt { background: #ff0000; }

    .platform-info { flex: 1; }
    .platform-name { font-size: .85rem; font-weight: 700; }
    .platform-status { font-size: .72rem; color: #718096; margin-top: 2px; }

    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      box-shadow: 2px 2px 4px #a3b1c6;
    }
    .status-dot.ok   { background: #38a169; }
    .status-dot.warn { background: #d69e2e; }
    .status-dot.err  { background: #e53e3e; }
    .status-dot.idle { background: #a0aec0; }

    /* Sync button */
    .sync-wrap { padding: 8px 16px 16px; }
    .sync-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #5a67d8, #6b46c1);
      color: #fff; border: none; border-radius: 12px;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      box-shadow: 4px 4px 10px #a3b1c6, -2px -2px 6px #ffffff;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .15s;
    }
    .sync-btn:hover  { opacity: .9; }
    .sync-btn:active { opacity: .8; }
    .sync-btn:disabled { opacity: .5; cursor: not-allowed; }
    .sync-btn svg { animation: none; }
    .sync-btn.syncing svg { animation: spin .8s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      margin: 0 16px 12px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: .78rem; font-weight: 600;
      display: none;
    }
    .toast.ok  { background: #c6f6d5; color: #276749; display:block; }
    .toast.err { background: #fed7d7; color: #9b2c2c; display:block; }

    /* Auto-sync toggle */
    .auto-row {
      margin: 0 16px 14px;
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .auto-label { font-size: .78rem; color: #718096; font-weight: 600; }

    .toggle { position:relative; width:38px; height:22px; }
    .toggle input { opacity:0; width:0; height:0; }
    .slider {
      position:absolute; inset:0; cursor:pointer; border-radius:22px;
      background: #a0aec0; transition:.3s;
      box-shadow: inset 2px 2px 4px #8a9ab0, inset -2px -2px 4px #b8c8d8;
    }
    .slider::before {
      content:""; position:absolute; height:16px; width:16px;
      left:3px; bottom:3px; background:#fff; border-radius:50%;
      transition:.3s; box-shadow:1px 1px 3px rgba(0,0,0,.2);
    }
    input:checked + .slider { background: linear-gradient(135deg,#5a67d8,#6b46c1); }
    input:checked + .slider::before { transform:translateX(16px); }

    /* Last sync */
    .last-sync {
      text-align: center; font-size: .7rem; color: #a0aec0;
      padding-bottom: 14px;
    }

    /* Settings panel */
    #settings-panel {
      display: none; padding: 16px;
    }
    #settings-panel h3 { font-size:.85rem; font-weight:700; margin-bottom:12px; color:#4a5568; }
    .field { margin-bottom: 12px; }
    .field label { display:block; font-size:.72rem; font-weight:600; color:#718096; margin-bottom:5px; }
    .field input {
      width:100%; padding:9px 12px; border:none; outline:none;
      border-radius:8px; font-size:.82rem; color:#2d3748;
      box-shadow: inset 3px 3px 7px #a3b1c6, inset -3px -3px 7px #ffffff;
      background: #e0e5ec;
    }
    .save-btn {
      width:100%; padding:10px; background:linear-gradient(135deg,#5a67d8,#6b46c1);
      color:#fff; border:none; border-radius:8px; font-weight:700;
      font-size:.85rem; cursor:pointer;
      box-shadow:3px 3px 8px #a3b1c6,-2px -2px 5px #ffffff;
    }
    .back-btn {
      background:none; border:none; cursor:pointer; padding:0;
      font-size:.8rem; color:#718096; font-weight:600; margin-bottom:12px;
      display:flex; align-items:center; gap:4px;
    }
  </style>
</head>
<body>

<!-- MAIN PANEL -->
<div id="main-panel">
  <div class="header">
    <div class="logo">
      <div class="logo-dot">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      </div>
      <div>
        <div class="logo-name">WSSD</div>
        <div class="logo-sub">Cookie Sync</div>
      </div>
    </div>
    <button class="settings-btn" id="open-settings" title="Configuración">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
      </svg>
    </button>
  </div>

  <div class="platforms">
    <!-- Instagram -->
    <div class="platform-row neo-sm" id="row-instagram">
      <div class="platform-icon ig">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
      </div>
      <div class="platform-info">
        <div class="platform-name">Instagram</div>
        <div class="platform-status" id="status-text-instagram">Verificando...</div>
      </div>
      <div class="status-dot idle" id="status-dot-instagram"></div>
    </div>

    <!-- Facebook -->
    <div class="platform-row neo-sm" id="row-facebook">
      <div class="platform-icon fb">f</div>
      <div class="platform-info">
        <div class="platform-name">Facebook</div>
        <div class="platform-status" id="status-text-facebook">Verificando...</div>
      </div>
      <div class="status-dot idle" id="status-dot-facebook"></div>
    </div>

    <!-- TikTok -->
    <div class="platform-row neo-sm" id="row-tiktok">
      <div class="platform-icon tt">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.93a8.16 8.16 0 004.77 1.52V7a4.85 4.85 0 01-1-.31z"/></svg>
      </div>
      <div class="platform-info">
        <div class="platform-name">TikTok</div>
        <div class="platform-status" id="status-text-tiktok">Verificando...</div>
      </div>
      <div class="status-dot idle" id="status-dot-tiktok"></div>
    </div>

    <!-- YouTube -->
    <div class="platform-row neo-sm" id="row-youtube">
      <div class="platform-icon yt">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      </div>
      <div class="platform-info">
        <div class="platform-name">YouTube</div>
        <div class="platform-status" id="status-text-youtube">Verificando...</div>
      </div>
      <div class="status-dot idle" id="status-dot-youtube"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Auto-sync toggle -->
  <div class="auto-row neo-sm" style="margin: 0 16px 10px;">
    <span class="auto-label">Sincronizar automáticamente</span>
    <label class="toggle">
      <input type="checkbox" id="auto-sync-toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Sync button -->
  <div class="sync-wrap">
    <button class="sync-btn" id="sync-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
      </svg>
      Sincronizar cookies ahora
    </button>
  </div>

  <div class="last-sync" id="last-sync-label">Nunca sincronizado</div>
</div>

<!-- SETTINGS PANEL -->
<div id="settings-panel">
  <button class="back-btn" id="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Volver
  </button>
  <h3>Configuración</h3>

  <div class="field">
    <label>URL del servidor WSSD</label>
    <input type="url" id="server-url" placeholder="https://tuservidor.com" />
  </div>
  <div class="field">
    <label>API Key</label>
    <input type="password" id="api-key" placeholder="wssd_xxxxxxxxxxxx" />
  </div>
  <button class="save-btn" id="save-settings">Guardar</button>
  <div class="toast" id="toast-settings" style="margin:12px 0 0;"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
